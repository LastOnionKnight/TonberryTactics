<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Tonberry Tactics · Materia Advisor</title>

<link rel="preconnect" href="https://fonts.googleapis.com" />
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
<link href="https://fonts.googleapis.com/css2?family=Press+Start+2P&family=VT323&family=JetBrains+Mono:wght@400;700&display=swap" rel="stylesheet" />

<link rel="stylesheet" href="styles.css" />

<script src="https://unpkg.com/react@18.3.1/umd/react.development.js" integrity="sha384-hD6/rw4ppMLGNu3tX5cjIb+uRZ7UkRJ6BPkLpg4hAu/6onKUg4lLsHAs9EBPT82L" crossorigin="anonymous"></script>
<script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js" integrity="sha384-u6aeetuaXnQ38mYT8rp6sbXaQe3NL9t+IBXmnYxwkUI2Hw4bsp2Wvmx4yRQF1uAm" crossorigin="anonymous"></script>
<script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" integrity="sha384-m08KidiNqLdpJqLq95G/LEi8Qvjl/xUYll3QILypMoQ65QorJ9Lvtp2RXYGBFj1y" crossorigin="anonymous"></script>
</head>

<body data-palette="ff3-blue" data-scanlines="on">
  <div id="root"></div>

  <script type="text/babel" src="tweaks-panel.jsx"></script>
  <script type="text/babel" src="onion-knight.jsx"></script>
  <script type="text/babel" src="materia-advisor.jsx"></script>

  <script type="text/babel">
    const { useEffect } = React;

    const TWEAK_DEFAULTS = /*EDITMODE-BEGIN*/{
      "palette": "ff3-blue",
      "scanlines": true,
      "showKnight": true,
      "borderStyle": "ff3-gold"
    }/*EDITMODE-END*/;

    function App() {
      const [t, setTweak] = useTweaks(TWEAK_DEFAULTS);

      useEffect(() => {
        document.body.setAttribute('data-palette', t.palette);
        document.body.setAttribute('data-scanlines', t.scanlines ? 'on' : 'off');
        document.body.setAttribute('data-show-knight', t.showKnight ? 'on' : 'off');
      }, [t.palette, t.scanlines, t.showKnight]);

      return (
        <>
          <GearGoblinWindow />

          <TweaksPanel title="Tweaks">
            <TweakSection label="Palette" />
            <TweakRadio
              label="Theme"
              value={t.palette}
              options={[
                { value: 'ff3-blue',    label: 'FF3 Blue'  },
                { value: 'ff6-brown',   label: 'FF6 Brown' },
                { value: 'ff14-indigo', label: 'FFXIV'     },
              ]}
              onChange={(v) => setTweak('palette', v)}
            />
            <TweakSection label="Atmosphere" />
            <TweakToggle
              label="CRT scanlines"
              value={t.scanlines}
              onChange={(v) => setTweak('scanlines', v)}
            />
            <TweakToggle
              label="Mascot portrait"
              value={t.showKnight}
              onChange={(v) => setTweak('showKnight', v)}
            />
          </TweaksPanel>
        </>
      );
    }

    // The TweakRadio in the starter expects plain string options OR
    // {value,label} objects — confirm it accepts the latter shape; fall back if not.
    ReactDOM.createRoot(document.getElementById('root')).render(<App />);
  </script>

  <style>
    /* Tweaks-driven overrides */
    body[data-show-knight="off"] .gg-hero-knight { display: none; }
    body[data-show-knight="off"] .gg-knight-callout {
      grid-template-columns: 1fr;
    }
    body[data-show-knight="off"] .gg-knight-callout > div:first-child { display: none; }
  </style>
</body>
</html>
